version: "3.8"

services:
  db:
    image: postgres:15
    container_name: my_postgres
    restart: always
    env_file: .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/config/init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build:
      context: .
      dockerfile: Dockerfile   # ✅ correct placement
    container_name: roar_node_app
    restart: always
    env_file: .env
    ports:
      - "${PORT}:3000"
    depends_on:
      - db

volumes:
  pgdata:
