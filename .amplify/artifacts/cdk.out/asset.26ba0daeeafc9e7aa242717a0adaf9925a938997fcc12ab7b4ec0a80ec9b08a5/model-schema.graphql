type User @model @auth(rules: [{allow: public, provider: apiKey, operations: [read]},
  {allow: owner, ownerField: "owner"}])
{
  username: String!
  profilePicURL: String
  bio: String
  posts: [Post] @hasMany(references: ["authorId"])
  comments: [Comment] @hasMany(references: ["userId"])
  likesList: [Like] @hasMany(references: ["userId"])
  followers: [Follow] @hasMany(references: ["followingId"])
  following: [Follow] @hasMany(references: ["followerId"])
}

type Post @model @auth(rules: [{allow: public, provider: apiKey, operations: [read]},
  {allow: owner, ownerField: "owner"}])
{
  videoURL: String
  teamTag: String
  sportTag: String
  timestamp: AWSDateTime
  description: String!
  likes: Int @default(value: "0")
  authorId: ID
  author: User @belongsTo(references: ["authorId"])
  comments: [Comment] @hasMany(references: ["postId"])
  likesList: [Like] @hasMany(references: ["postId"])
}

type Like @model @auth(rules: [{allow: public, provider: apiKey, operations: [read]},
  {allow: owner, ownerField: "owner"}])
{
  userId: ID
  postId: ID
  user: User @belongsTo(references: ["userId"])
  post: Post @belongsTo(references: ["postId"])
}

type Comment @model @auth(rules: [{allow: public, provider: apiKey, operations: [read]},
  {allow: owner, ownerField: "owner"}])
{
  content: String!
  userId: ID
  postId: ID
  user: User @belongsTo(references: ["userId"])
  post: Post @belongsTo(references: ["postId"])
}

type Follow @model @auth(rules: [{allow: public, provider: apiKey, operations: [read]},
  {allow: owner, ownerField: "owner"}])
{
  followerId: ID
  followingId: ID
  follower: User @belongsTo(references: ["followerId"])
  following: User @belongsTo(references: ["followingId"])
}